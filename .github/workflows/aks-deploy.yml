name: Build & Deploy to AKS

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dvop400-app:latest
          platforms: linux/amd64,linux/arm64

      - name: Set output image
        id: set-image
        run: echo "::set-output name=image::${{ secrets.DOCKER_USERNAME }}/dvop400-app:latest"

  deploy-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v2
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy app to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/dvop400-app dvop400-app=${{ secrets.DOCKER_USERNAME }}/dvop400-app:latest
          kubectl rollout restart deployment/dvop400-app
          kubectl rollout status deployment/dvop400-app

      - name: Show service details
        run: kubectl get svc dvop400-service -o wide
