apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvop400-app
  labels:
    app: dvop400-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dvop400-app
  template:
    metadata:
      labels:
        app: dvop400-app
    spec:
      containers:
        - name: dvop400-app
          image: tristan367/dvop400-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: dvop400-service
spec:
  selector:
    app: dvop400-app
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
